<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>熱量地雷 Calories Sweeper</title>

<style>
    *{
        box-sizing:border-box;
        font-family:"Microsoft JhengHei",sans-serif;
    }

    body{
        margin:0;
        background:#dff6f0;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }

    .game-container{
        background:white;
        padding:20px;
        border-radius:20px;
        box-shadow:0 10px 30px rgba(0,0,0,0.15);
        width:420px;
    }

    h1{
        text-align:center;
        margin-top:0;
        color:#2c7a7b;
    }

    .top-bar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        background:#f4f4f4;
        padding:12px;
        border-radius:12px;
        margin-bottom:15px;
        font-size:18px;
        font-weight:bold;
    }

    .health{
        color:#2f855a;
    }

    .danger-count{
        color:#e53e3e;
    }

    .board{
        display:grid;
        grid-template-columns:repeat(8, 45px);
        gap:5px;
        justify-content:center;
    }

    .cell{
        width:45px;
        height:45px;
        background:#b2f5ea;
        border-radius:10px;
        display:flex;
        justify-content:center;
        align-items:center;
        font-weight:bold;
        font-size:18px;
        cursor:pointer;
        user-select:none;
        transition:0.2s;
    }

    .cell:hover{
        transform:scale(1.05);
    }

    .revealed{
        background:#edf2f7;
    }

    .mine{
        background:#fc8181;
        color:white;
    }

    .healthy{
        background:#c6f6d5;
    }

    .message{
        margin-top:15px;
        text-align:center;
        font-size:16px;
        min-height:40px;
        color:#444;
    }

    .restart{
        margin-top:15px;
        width:100%;
        padding:12px;
        border:none;
        border-radius:12px;
        background:#38b2ac;
        color:white;
        font-size:16px;
        cursor:pointer;
    }

    .restart:hover{
        background:#319795;
    }

</style>
</head>

<body>

<div class="game-container">

    <h1>🍔 熱量地雷</h1>

    <div class="top-bar">
        <div class="danger-count">
            飲食地雷：<span id="mineCount"></span>
        </div>

        <div class="health">
            健康值：<span id="health">100</span>
        </div>
    </div>

    <div class="board" id="board"></div>

    <div class="message" id="message">
        避開高熱量食物！
    </div>

    <button class="restart" onclick="startGame()">
        重新開始
    </button>

</div>

<script>

const size = 8;
const mineTotal = 10;

let board = [];
let health = 100;
let gameOver = false;

const unhealthyFoods = [
    "🍟",
    "🍔",
    "🧋",
    "🍰",
    "🍩",
    "🍗"
];

const healthTips = [
    "含糖飲料容易造成熱量超標",
    "炸物脂肪含量偏高",
    "甜食容易增加糖分攝取",
    "多喝水比含糖飲料更健康",
    "均衡飲食有助於維持健康"
];

function startGame(){

    board = [];
    gameOver = false;
    health = 100;

    document.getElementById("health").innerText = health;
    document.getElementById("mineCount").innerText = mineTotal;
    document.getElementById("message").innerText = "避開高熱量食物！";

    const boardElement = document.getElementById("board");
    boardElement.innerHTML = "";

    // 建立空白棋盤
    for(let row=0; row<size; row++){

        board[row] = [];

        for(let col=0; col<size; col++){

            board[row][col] = {
                mine:false,
                revealed:false,
                count:0
            };
        }
    }

    // 放置地雷
    let minesPlaced = 0;

    while(minesPlaced < mineTotal){

        let r = Math.floor(Math.random()*size);
        let c = Math.floor(Math.random()*size);

        if(!board[r][c].mine){

            board[r][c].mine = true;
            minesPlaced++;
        }
    }

    // 計算數字
    for(let row=0; row<size; row++){

        for(let col=0; col<size; col++){

            if(board[row][col].mine) continue;

            let count = 0;

            for(let dr=-1; dr<=1; dr++){

                for(let dc=-1; dc<=1; dc++){

                    let nr = row + dr;
                    let nc = col + dc;

                    if(
                        nr>=0 &&
                        nr<size &&
                        nc>=0 &&
                        nc<size &&
                        board[nr][nc].mine
                    ){
                        count++;
                    }
                }
            }

            board[row][col].count = count;
        }
    }

    // 建立畫面
    for(let row=0; row<size; row++){

        for(let col=0; col<size; col++){

            const cell = document.createElement("div");

            cell.classList.add("cell");

            cell.dataset.row = row;
            cell.dataset.col = col;

            cell.addEventListener("click", revealCell);

            boardElement.appendChild(cell);
        }
    }
}

function revealCell(){

    if(gameOver) return;

    const row = this.dataset.row;
    const col = this.dataset.col;

    const cellData = board[row][col];

    if(cellData.revealed) return;

    cellData.revealed = true;

    this.classList.add("revealed");

    // 踩到地雷
    if(cellData.mine){

        this.classList.add("mine");

        const randomFood =
            unhealthyFoods[
                Math.floor(Math.random()*unhealthyFoods.length)
            ];

        this.innerText = randomFood;

        health -= 20;

        document.getElementById("health").innerText = health;

        const randomTip =
            healthTips[
                Math.floor(Math.random()*healthTips.length)
            ];

        document.getElementById("message").innerText =
            "⚠️ " + randomTip;

        if(health <= 0){

            gameOver = true;

            document.getElementById("message").innerText =
                "💀 健康值歸零！少吃垃圾食物！";

            revealAllMines();
        }

        return;
    }

    // 安全格
    this.classList.add("healthy");

    if(cellData.count > 0){

        this.innerText = cellData.count;

    }else{

        this.innerText = "🥗";

        revealNearby(row, col);
    }

    checkWin();
}

function revealNearby(row, col){

    for(let dr=-1; dr<=1; dr++){

        for(let dc=-1; dc<=1; dc++){

            let nr = parseInt(row) + dr;
            let nc = parseInt(col) + dc;

            if(
                nr>=0 &&
                nr<size &&
                nc>=0 &&
                nc<size
            ){

                const index = nr * size + nc;

                const cellElement =
                    document.getElementsByClassName("cell")[index];

                const cellData = board[nr][nc];

                if(!cellData.revealed && !cellData.mine){

                    cellElement.click();
                }
            }
        }
    }
}

function revealAllMines(){

    const cells = document.getElementsByClassName("cell");

    for(let row=0; row<size; row++){

        for(let col=0; col<size; col++){

            if(board[row][col].mine){

                const index = row * size + col;

                cells[index].classList.add("mine");

                cells[index].innerText =
                    unhealthyFoods[
                        Math.floor(Math.random()*unhealthyFoods.length)
                    ];
            }
        }
    }
}

function checkWin(){

    let safeCells = 0;

    for(let row=0; row<size; row++){

        for(let col=0; col<size; col++){

            if(
                !board[row][col].mine &&
                board[row][col].revealed
            ){
                safeCells++;
            }
        }
    }

    if(safeCells === (size*size - mineTotal)){

        gameOver = true;

        document.getElementById("message").innerText =
            "🎉 今日健康飲食達成！";
    }
}

startGame();

</script>

</body>
</html>
