<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>營養衝線：均衡人生 - 成人背後視角版</title>
<style>
    body { margin:0; font-family: 'Microsoft JhengHei', Arial; background: #0f172a; color: #fff; text-align:center; }
    canvas { border: 3px solid #22d3ee; border-radius: 12px; background: #111; }
    #ui { position: absolute; top: 15px; left: 15px; font-size: 18px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; }
    #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15,23,42,0.95); padding: 30px; border-radius: 15px; width: 80%; max-width: 600px; display: none; }
</style>
</head>
<body>

<h1>🏃‍♂️ 營養衝線：均衡人生 🏃‍♀️</h1>
<div id="ui">
    距離: <span id="distance">0</span> 公尺　|　
    分數: <span id="score">0</span>　|　
    均衡指數: <span id="balance">100</span>%　|　
    體力: <span id="energy">100</span>
</div>

<canvas id="canvas" width="800" height="600"></canvas>

<div id="gameOver">
    <h2>遊戲結束！你的均衡人生跑了多遠？</h2>
    <p id="finalScore"></p>
    <div id="nutritionReport"></div>
    <button onclick="restart()" style="padding:12px 30px; font-size:18px; margin-top:15px;">重新挑戰</button>
</div>

<script>
// ==================== 遊戲設定 ====================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let gameRunning = true;
let distance = 0;
let score = 0;
let balance = 100;
let energy = 100;
let speed = 6;
let currentScene = 0;

const lanes = [250, 400, 550]; // 三條跑道 X 座標
let currentLane = 1; // 0,1,2

// 玩家
const player = { y: 380, height: 90, width: 60 };

// 物品與障礙
let items = [];
let obstacles = [];

// 場景定義
const scenes = [
    {name: "城市街道", bg: "#334155", ground: "#1e2937", speedBoost: 0},
    {name: "超市通道", bg: "#7c3aed", ground: "#6d28d9", speedBoost: 1},
    {name: "健康農場", bg: "#166534", ground: "#14532d", speedBoost: 2},
    {name: "身體循環", bg: "#b91c1c", ground: "#991b1b", speedBoost: 3}
];

let frame = 0;
let keys = {};

// ==================== 食物資料 ====================
const foodDB = [
    {emoji:"🥬", type:"healthy", score:15, balance:8, energy:5},
    {emoji:"🍎", type:"healthy", score:12, balance:7, energy:6},
    {emoji:"🐟", type:"healthy", score:20, balance:10, energy:12},
    {emoji:"🥜", type:"healthy", score:14, balance:6, energy:10},
    {emoji:"🧋", type:"junk", score:-25, balance:-18, energy:-30},
    {emoji:"🍟", type:"junk", score:-18, balance:-15, energy:-22},
    {emoji:"🍩", type:"junk", score:-15, balance:-12, energy:-18}
];

// ==================== 鍵盤控制 ====================
window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if ((e.key === 'ArrowLeft' || e.key === 'a') && currentLane > 0) currentLane--;
    if ((e.key === 'ArrowRight' || e.key === 'd') && currentLane < 2) currentLane++;
    if (e.key === ' ' || e.key === 'Spacebar') jump();
});

function jump() {
    // 簡單跳躍視覺效果（可再擴充）
    if (player.y === 380) player.y = 320;
    setTimeout(() => { if (gameRunning) player.y = 380; }, 420);
}

// ==================== 主迴圈 ====================
function gameLoop() {
    if (!gameRunning) return;
    frame++;
    distance += Math.floor(speed / 3);

    // 更新難度與場景
    if (distance > (currentScene + 1) * 800) {
        currentScene = Math.min(scenes.length - 1, currentScene + 1);
        speed += 0.6; // 場景切換加速
    }

    const scene = scenes[currentScene];

    // 清畫面 + 背景
    ctx.fillStyle = scene.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 滾動地面
    ctx.fillStyle = scene.ground;
    ctx.fillRect(0, 480, canvas.width, 120);

    // 畫跑道線
    ctx.strokeStyle = "rgba(255,255,255,0.3)";
    ctx.lineWidth = 6;
    for (let x of lanes) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }

    // 玩家（背後視角）
    ctx.font = "70px Arial";
    ctx.fillText("🏃", lanes[currentLane] - 30, player.y + 50);

    // 生成物品與障礙
    if (frame % Math.max(28, 45 - Math.floor(distance/300)) === 0) {
        const isObstacle = Math.random() < (0.35 + currentScene * 0.08);
        
        if (isObstacle) {
            obstacles.push({
                x: lanes[Math.floor(Math.random()*3)],
                y: -50,
                emoji: "🚧"
            });
        } else {
            items.push({
                x: lanes[Math.floor(Math.random()*3)],
                y: -60,
                ...foodDB[Math.floor(Math.random() * foodDB.length)]
            });
        }
    }

    // 更新 & 繪製物品
    for (let i = items.length-1; i >= 0; i--) {
        let it = items[i];
        it.y += speed;
        ctx.font = "50px Arial";
        ctx.fillText(it.emoji, it.x - 25, it.y);

        if (Math.abs(it.x - lanes[currentLane]) < 50 && Math.abs(it.y - player.y) < 70) {
            score += it.score;
            balance = Math.max(10, Math.min(100, balance + it.balance));
            energy = Math.max(5, Math.min(100, energy + it.energy));
            items.splice(i,1);
        }
        if (it.y > canvas.height) items.splice(i,1);
    }

    // 更新 & 繪製障礙
    for (let i = obstacles.length-1; i >= 0; i--) {
        let ob = obstacles[i];
        ob.y += speed * 1.1;
        ctx.font = "55px Arial";
        ctx.fillText(ob.emoji, ob.x - 30, ob.y);

        if (Math.abs(ob.x - lanes[currentLane]) < 45 && Math.abs(ob.y - player.y) < 75) {
            energy -= 35;
            obstacles.splice(i,1);
        }
        if (ob.y > canvas.height) obstacles.splice(i,1);
    }

    // UI 更新
    document.getElementById('distance').textContent = distance;
    document.getElementById('score').textContent = score;
    document.getElementById('balance').textContent = Math.floor(balance);
    document.getElementById('energy').textContent = Math.floor(energy);

    // 體力自然消耗 + 均衡懲罰
    if (frame % 50 === 0) {
        energy -= (0.6 + currentScene * 0.3);
        if (balance < 55)
