<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>營養衝線：均衡人生 - 成人衛教版</title>
<style>
    body { margin:0; font-family: 'Microsoft JhengHei', Arial; background: #0f172a; color: #fff; text-align:center; }
    canvas { border: 3px solid #22d3ee; border-radius: 12px; background: linear-gradient(#0ea5e9, #22d3ee); }
    #ui { position: absolute; top: 15px; left: 15px; font-size: 18px; }
    #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 30px; border-radius: 15px; display: none; }
</style>
</head>
<body>

<h1>🍎 營養衝線：均衡人生 🍎</h1>
<div id="ui">
    距離: <span id="distance">0</span>m　|　
    分數: <span id="score">0</span>　|　
    均衡指數: <span id="balance">100</span>%　|　
    體力: <span id="energy">100</span>
</div>

<canvas id="canvas" width="900" height="500"></canvas>

<div id="gameOver">
    <h2>遊戲結束！</h2>
    <p id="finalScore"></p>
    <div id="nutritionReport"></div>
    <button onclick="restart()">重新開始</button>
</div>

<script>
// ==================== 遊戲變數 ====================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let gameRunning = true;
let distance = 0;
let score = 0;
let balance = 100;
let energy = 100;
let speed = 5;

// 玩家
const player = {
    x: 150,
    y: 350,
    width: 60,
    height: 80,
    vy: 0,
    jumping: false
};

// 食物與障礙
let items = [];

// 食物資料庫（成人版更豐富）
const foodDB = [
    // 健康食物 (+分, +均衡)
    {name:"綠葉菜", emoji:"🥬", type:"healthy", score:15, balance:8, energy:5},
    {name:"糙米飯", emoji:"🍚", type:"healthy", score:12, balance:7, energy:8},
    {name:"鮭魚", emoji:"🐟", type:"healthy", score:18, balance:9, energy:10},
    {name:"堅果", emoji:"🥜", type:"healthy", score:14, balance:6, energy:12},
    {name:"優格", emoji:"🥛", type:"healthy", score:13, balance:7, energy:6},
    {name:"蘋果", emoji:"🍎", type:"healthy", score:10, balance:5, energy:4},
    
    // 不健康食物 (-分, -均衡, -體力)
    {name:"珍奶", emoji:"🧋", type:"junk", score:-20, balance:-15, energy:-25},
    {name:"炸雞", emoji:"🍟", type:"junk", score:-15, balance:-12, energy:-18},
    {name:"可樂", emoji:"🥤", type:"junk", score:-18, balance:-20, energy:-30},
    {name:"甜甜圈", emoji:"🍩", type:"junk", score:-12, balance:-10, energy:-15}
];

let keys = {};
let frame = 0;

// ==================== 控制 ====================
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

// 跳躍
function jump() {
    if (!player.jumping) {
        player.vy = -18;
        player.jumping = true;
    }
}

// ==================== 主遊戲迴圈 ====================
function gameLoop() {
    if (!gameRunning) return;
    
    frame++;
    distance += Math.floor(speed / 2);
    
    // 更新UI
    document.getElementById('distance').textContent = distance;
    document.getElementById('score').textContent = score;
    document.getElementById('balance').textContent = balance;
    document.getElementById('energy').textContent = Math.floor(energy);

    // 背景
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 地面
    ctx.fillStyle = '#166534';
    ctx.fillRect(0, 420, canvas.width, 80);
    
    // 玩家物理
    player.vy += 0.8; // 重力
    player.y += player.vy;
    
    if (player.y >= 350) {
        player.y = 350;
        player.vy = 0;
        player.jumping = false;
    }
    
    // 畫玩家
    ctx.font = '60px Arial';
    ctx.fillText('🏃', player.x, player.y + 60);
    
    // 生成物品
    if (frame % 35 === 0) {
        const isJunk = Math.random() < 0.45;
        items.push({
            x: canvas.width + 50,
            y: Math.random() * 220 + 180,
            ...foodDB[Math.floor(Math.random() * foodDB.length)]
        });
    }
    
    // 更新與繪製物品
    for (let i = items.length - 1; i >= 0; i--) {
        let item = items[i];
        item.x -= speed;
        
        ctx.font = '45px Arial';
        ctx.fillText(item.emoji, item.x, item.y);
        
        // 碰撞檢測
        if (
            item.x < player.x + player.width - 10 &&
            item.x + 40 > player.x &&
            item.y < player.y + player.height &&
            item.y + 40 > player.y
        ) {
            score += item.score;
            balance = Math.max(0, Math.min(100, balance + item.balance));
            energy = Math.max(0, Math.min(100, energy + item.energy));
            
            // 衛教提示
            if (item.type === "junk" && Math.random() < 0.6) {
                console.log(`⚠️ ${item.name}：過多糖分/油脂會影響代謝`);
            }
            
            items.splice(i, 1);
        }
        
        if (item.x < -50) items.splice(i, 1);
    }
    
    // 難度提升
    if (distance % 300 === 0 && speed < 9) speed += 0.3;
    
    // 體力與均衡懲罰
    if (frame % 60 === 0) {
        energy -= 0.4;
        if (balance < 60) energy -= 0.8;
    }
    
    // 遊戲結束條件
    if (energy <= 0 || balance <= 10) {
        gameOver();
        return;
    }
    
    requestAnimationFrame(gameLoop);
}

// ==================== 遊戲結束 ====================
function gameOver() {
    gameRunning = false;
    const report = document.getElementById('nutritionReport');
    
    let comment = '';
    if (balance >= 85) comment = '🎉 優秀！你非常懂得均衡飲食！';
    else if (balance >= 70) comment = '👍 不錯！可以再更均衡一些。';
    else comment = '⚠️ 建議多攝取蔬菜與優質蛋白質，減少精緻糖。';
    
    report.innerHTML = `
        <p>最終距離：${distance} 公尺</p>
        <p>均衡指數：${balance}%　${comment}</p>
        <p style="font-size:14px; margin-top:15px;">
            衛教小提醒：<br>
            均衡飲食是預防慢性病最重要的基礎<br>
            建議每日遵循「我的餐盤」：½ 蔬果、¼ 優質蛋白、¼ 全穀
        </p>
    `;
    
    document.getElementById('finalScore').innerHTML = `總分：${score} 分`;
    document.getElementById('gameOver').style.display = 'block';
}

function restart() {
    location.reload();
}

// 開始遊戲
document.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Spacebar') jump();
});

gameLoop();
</script>

<p style="margin-top:20px; color:#94a3b8;">
    操作方式：按空白鍵跳躍　<br>
    收集🥬🍎🐟等健康食物，避開🧋🍟🥤等高糖高油食物<br>
    維持高均衡指數與體力才能跑得更遠！
</p>

</body>
</html>
