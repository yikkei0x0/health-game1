<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康防衛消消樂</title>

<style>
body{
    margin:0;
    background:linear-gradient(180deg,#dff6ff,#ffffff);
    font-family:"Microsoft JhengHei",sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
}

h1{
    margin-top:20px;
    color:#1565c0;
    text-shadow:2px 2px 4px rgba(0,0,0,0.2);
}

#game{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(8,70px);
    grid-template-rows:repeat(8,70px);
    gap:5px;
    background:#90caf9;
    padding:10px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.cell{
    width:70px;
    height:70px;
    background:white;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:38px;
    cursor:pointer;
    transition:0.2s;
    user-select:none;
}

.cell:hover{
    transform:scale(1.08);
    background:#e3f2fd;
}

.selected{
    outline:4px solid #ff9800;
}

#scoreBoard{
    margin-top:20px;
    font-size:24px;
    color:#0d47a1;
    font-weight:bold;
}

#tip{
    margin-top:15px;
    width:80%;
    max-width:700px;
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    color:#333;
    font-size:18px;
    text-align:center;
}

@media(max-width:700px){
    #game{
        grid-template-columns:repeat(8,40px);
        grid-template-rows:repeat(8,40px);
    }

    .cell{
        width:40px;
        height:40px;
        font-size:24px;
    }
}
</style>
</head>

<body>

<h1>🩺 健康防衛消消樂 🩺</h1>

<div id="scoreBoard">分數：0</div>

<div id="game"></div>

<div id="tip">
    消除健康道具，學習防疫知識！
</div>

<script>

const game = document.getElementById("game");
const scoreBoard = document.getElementById("scoreBoard");
const tipBox = document.getElementById("tip");

const icons = ["🦠","😷","🧼","💉","🥦"];

const tips = [
"勤洗手可以降低病毒傳播風險！",
"戴口罩能保護自己與他人！",
"均衡飲食有助提升免疫力！",
"接種疫苗可以降低重症風險！",
"保持運動與睡眠有助健康！"
];

const size = 8;
let board = [];
let score = 0;

let selected = null;

function randomIcon(){
    return icons[Math.floor(Math.random()*icons.length)];
}

function createBoard(){

    board = [];

    for(let row=0; row<size; row++){

        let currentRow=[];

        for(let col=0; col<size; col++){
            currentRow.push(randomIcon());
        }

        board.push(currentRow);
    }

    drawBoard();
}

function drawBoard(){

    game.innerHTML="";

    for(let row=0; row<size; row++){

        for(let col=0; col<size; col++){

            const cell=document.createElement("div");

            cell.classList.add("cell");

            cell.textContent=board[row][col];

            cell.dataset.row=row;
            cell.dataset.col=col;

            cell.addEventListener("click",cellClick);

            game.appendChild(cell);
        }
    }
}

function cellClick(){

    const row=parseInt(this.dataset.row);
    const col=parseInt(this.dataset.col);

    if(!selected){

        selected={row,col};

        this.classList.add("selected");

    }else{

        const first=document.querySelector(".selected");

        const distance=
            Math.abs(selected.row-row)+
            Math.abs(selected.col-col);

        if(distance===1){

            swap(selected.row,selected.col,row,col);

            if(checkMatches()){

                processMatches();

            }else{

                swap(selected.row,selected.col,row,col);
            }
        }

        selected=null;

        if(first) first.classList.remove("selected");

        drawBoard();
    }
}

function swap(r1,c1,r2,c2){

    let temp=board[r1][c1];

    board[r1][c1]=board[r2][c2];

    board[r2][c2]=temp;
}

function checkMatches(){

    for(let row=0; row<size; row++){

        for(let col=0; col<size-2; col++){

            let icon=board[row][col];

            if(
                icon &&
                icon===board[row][col+1] &&
                icon===board[row][col+2]
            ){
                return true;
            }
        }
    }

    for(let col=0; col<size; col++){

        for(let row=0; row<size-2; row++){

            let icon=board[row][col];

            if(
                icon &&
                icon===board[row+1][col] &&
                icon===board[row+2][col]
            ){
                return true;
            }
        }
    }

    return false;
}

function processMatches(){

    let matched=[];

    for(let row=0; row<size; row++){

        for(let col=0; col<size-2; col++){

            let icon=board[row][col];

            if(
                icon &&
                icon===board[row][col+1] &&
                icon===board[row][col+2]
            ){

                matched.push([row,col]);
                matched.push([row,col+1]);
                matched.push([row,col+2]);
            }
        }
    }

    for(let col=0; col<size; col++){

        for(let row=0; row<size-2; row++){

            let icon=board[row][col];

            if(
                icon &&
                icon===board[row+1][col] &&
                icon===board[row+2][col]
            ){

                matched.push([row,col]);
                matched.push([row+1,col]);
                matched.push([row+2,col]);
            }
        }
    }

    matched.forEach(pos=>{

        let r=pos[0];
        let c=pos[1];

        board[r][c]=null;
    });

    score+=matched.length*10;

    scoreBoard.textContent="分數："+score;

    tipBox.textContent=
        tips[Math.floor(Math.random()*tips.length)];

    dropTiles();

    setTimeout(()=>{
        drawBoard();

        if(checkMatches()){

            processMatches();
        }

    },200);
}

function dropTiles(){

    for(let col=0; col<size; col++){

        let column=[];

        for(let row=size-1; row>=0; row--){

            if(board[row][col]){

                column.push(board[row][col]);
            }
        }

        while(column.length<size){

            column.push(randomIcon());
        }

        for(let row=size-1; row>=0; row--){

            board[row][col]=column[size-1-row];
        }
    }
}

createBoard();

</script>

</body>
</html>
