<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>健康防衛消消樂 PRO</title>

<style>

body{
    margin:0;
    background:linear-gradient(180deg,#d7f3ff,#ffffff);
    font-family:"Microsoft JhengHei",sans-serif;
    overflow:hidden;
}

h1{
    text-align:center;
    color:#1565c0;
    margin-top:10px;
}

#topUI{
    display:flex;
    justify-content:center;
    gap:30px;
    font-size:22px;
    font-weight:bold;
    color:#0d47a1;
}

#game{
    width:600px;
    height:600px;
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(8,1fr);
    grid-template-rows:repeat(8,1fr);
    gap:5px;
    background:#90caf9;
    padding:10px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.cell{
    background:white;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    cursor:pointer;
    transition:
        transform 0.25s,
        top 0.3s,
        left 0.3s,
        opacity 0.25s;
    position:relative;
    user-select:none;
}

.cell:hover{
    transform:scale(1.08);
}

.selected{
    outline:4px solid orange;
}

.destroy{
    animation:explode 0.35s forwards;
}

@keyframes explode{
    0%{
        transform:scale(1);
        opacity:1;
    }
    100%{
        transform:scale(0);
        opacity:0;
    }
}

.fall{
    animation:fallAnim 0.3s;
}

@keyframes fallAnim{
    0%{
        transform:translateY(-40px);
        opacity:0;
    }
    100%{
        transform:translateY(0);
        opacity:1;
    }
}

#tip{
    width:600px;
    margin:auto;
    background:white;
    padding:15px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

#skills{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:10px;
}

.skillBtn{
    padding:12px 20px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    background:#42a5f5;
    color:white;
    font-weight:bold;
    transition:0.2s;
}

.skillBtn:hover{
    transform:scale(1.08);
}

#combo{
    position:fixed;
    top:120px;
    left:50%;
    transform:translateX(-50%);
    font-size:48px;
    color:#ff5722;
    font-weight:bold;
    opacity:0;
    pointer-events:none;
}

.showCombo{
    animation:comboAnim 1s;
}

@keyframes comboAnim{
    0%{
        opacity:0;
        transform:translateX(-50%) scale(0.5);
    }
    40%{
        opacity:1;
        transform:translateX(-50%) scale(1.3);
    }
    100%{
        opacity:0;
        transform:translateX(-50%) scale(1);
    }
}

@media(max-width:700px){

    #game{
        width:95vw;
        height:95vw;
    }

    .cell{
        font-size:28px;
    }

    #tip{
        width:90%;
    }
}

</style>
</head>

<body>

<h1>🩺 健康防衛消消樂 PRO 🩺</h1>

<div id="topUI">
    <div id="score">分數：0</div>
    <div id="level">關卡：1</div>
</div>

<div id="skills">
    <button class="skillBtn" onclick="useBomb()">
        💉 疫苗炸彈
    </button>

    <button class="skillBtn" onclick="cleanVirus()">
        🧼 全面消毒
    </button>
</div>

<div id="game"></div>

<div id="tip">
    消除健康道具，學習防疫知識！
</div>

<div id="combo"></div>

<script>

const size=8;

const icons=["🦠","😷","🧼","💉","🥦"];

const tips=[
"勤洗手能有效降低感染風險！",
"均衡飲食有助提升免疫力！",
"接種疫苗可降低重症機率！",
"規律運動能提升身體防護力！",
"戴口罩可降低飛沫傳播！"
];

const levelTargets=[500,1200,2500];

let board=[];
let score=0;
let level=1;
let combo=0;

let selected=null;

const game=document.getElementById("game");

function randomIcon(){
    return icons[Math.floor(Math.random()*icons.length)];
}

function init(){

    board=[];

    for(let r=0;r<size;r++){

        let row=[];

        for(let c=0;c<size;c++){

            row.push(randomIcon());
        }

        board.push(row);
    }

    render();
}

function render(){

    game.innerHTML="";

    for(let r=0;r<size;r++){

        for(let c=0;c<size;c++){

            const cell=document.createElement("div");

            cell.className="cell fall";

            cell.innerText=board[r][c];

            cell.dataset.row=r;
            cell.dataset.col=c;

            cell.onclick=clickCell;

            game.appendChild(cell);
        }
    }
}

function clickCell(){

    const r=parseInt(this.dataset.row);
    const c=parseInt(this.dataset.col);

    if(!selected){

        selected={r,c};

        this.classList.add("selected");

    }else{

        const dist=
            Math.abs(selected.r-r)+
            Math.abs(selected.c-c);

        if(dist===1){

            swap(selected.r,selected.c,r,c);

            if(findMatches().length>0){

                process();

            }else{

                swap(selected.r,selected.c,r,c);
            }
        }

        selected=null;

        render();
    }
}

function swap(r1,c1,r2,c2){

    let t=board[r1][c1];

    board[r1][c1]=board[r2][c2];

    board[r2][c2]=t;
}

function findMatches(){

    let matched=[];

    for(let r=0;r<size;r++){

        for(let c=0;c<size-2;c++){

            let a=board[r][c];

            if(
                a &&
                a===board[r][c+1] &&
                a===board[r][c+2]
            ){

                matched.push([r,c],[r,c+1],[r,c+2]);
            }
        }
    }

    for(let c=0;c<size;c++){

        for(let r=0;r<size-2;r++){

            let a=board[r][c];

            if(
                a &&
                a===board[r+1][c] &&
                a===board[r+2][c]
            ){

                matched.push([r,c],[r+1,c],[r+2,c]);
            }
        }
    }

    return matched;
}

function process(){

    let matched=findMatches();

    if(matched.length===0){

        combo=0;
        return;
    }

    combo++;

    showCombo(combo);

    matched.forEach(p=>{

        board[p[0]][p[1]]=null;
    });

    score+=matched.length*10*combo;

    updateUI();

    document.getElementById("tip").innerText=
        tips[Math.floor(Math.random()*tips.length)];

    setTimeout(()=>{

        dropTiles();

        render();

        setTimeout(process,300);

    },250);
}

function dropTiles(){

    for(let c=0;c<size;c++){

        let arr=[];

        for(let r=size-1;r>=0;r--){

            if(board[r][c]!=null){

                arr.push(board[r][c]);
            }
        }

        while(arr.length<size){

            arr.push(randomIcon());
        }

        for(let r=size-1;r>=0;r--){

            board[r][c]=arr[size-1-r];
        }
    }
}

function updateUI(){

    document.getElementById("score").innerText=
        "分數："+score;

    if(
        level<4 &&
        score>=levelTargets[level-1]
    ){

        level++;

        document.getElementById("level").innerText=
            "關卡："+level;

        alert("🎉 進入第 "+level+" 關！");
    }
}

function showCombo(num){

    const comboDiv=document.getElementById("combo");

    comboDiv.innerText=num+" COMBO!";

    comboDiv.classList.remove("showCombo");

    void comboDiv.offsetWidth;

    comboDiv.classList.add("showCombo");
}

function useBomb(){

    let r=Math.floor(Math.random()*size);
    let c=Math.floor(Math.random()*size);

    for(let rr=r-1;rr<=r+1;rr++){

        for(let cc=c-1;cc<=c+1;cc++){

            if(
                rr>=0 &&
                rr<size &&
                cc>=0 &&
                cc<size
            ){

                board[rr][cc]=null;
            }
        }
    }

    dropTiles();

    render();
}

function cleanVirus(){

    for(let r=0;r<size;r++){

        for(let c=0;c<size;c++){

            if(board[r][c]=="🦠"){

                board[r][c]=null;
            }
        }
    }

    dropTiles();

    render();
}

init();

</script>

</body>
</html>
