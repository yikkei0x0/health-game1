<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>熱量地雷 Calories Sweeper</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI","Microsoft JhengHei",sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #7dd3fc,
        #99f6e4
    );

    overflow:hidden;
}

/* 背景泡泡 */

.bubble{

    position:absolute;

    border-radius:50%;

    background:rgba(255,255,255,0.2);

    animation:float 8s infinite ease-in-out;
}

.bubble1{
    width:220px;
    height:220px;
    top:-60px;
    left:-60px;
}

.bubble2{
    width:140px;
    height:140px;
    right:50px;
    bottom:80px;
}

.bubble3{
    width:90px;
    height:90px;
    right:200px;
    top:140px;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-20px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* 主容器 */

.game-container{

    position:relative;
    z-index:10;

    width:620px;

    background:rgba(255,255,255,0.92);

    backdrop-filter:blur(10px);

    border-radius:30px;

    padding:30px;

    box-shadow:
    0 20px 40px rgba(0,0,0,0.15);
}

/* 標題 */

.title{

    text-align:center;

    margin-bottom:20px;
}

.title h1{

    font-size:42px;

    color:#0f766e;
}

.title p{

    margin-top:8px;

    color:#666;
}

/* 關卡按鈕 */

.level-select{

    display:flex;

    justify-content:center;

    gap:15px;

    margin-bottom:25px;
}

.level-btn{

    border:none;

    padding:12px 20px;

    border-radius:14px;

    cursor:pointer;

    color:white;

    font-weight:bold;

    font-size:15px;

    transition:0.25s;

    box-shadow:
    0 5px 12px rgba(0,0,0,0.15);
}

.level-btn:hover{

    transform:
    translateY(-2px)
    scale(1.05);
}

.easy{
    background:linear-gradient(135deg,#22c55e,#16a34a);
}

.medium{
    background:linear-gradient(135deg,#f59e0b,#f97316);
}

.hard{
    background:linear-gradient(135deg,#ef4444,#dc2626);
}

/* 資訊欄 */

.top-bar{

    display:flex;

    gap:15px;

    margin-bottom:25px;
}

.info-card{

    flex:1;

    background:
    linear-gradient(
        145deg,
        #ffffff,
        #ecfeff
    );

    border-radius:20px;

    padding:15px;

    text-align:center;

    box-shadow:
    inset 0 2px 0 rgba(255,255,255,0.8),
    0 5px 12px rgba(0,0,0,0.06);
}

.info-label{

    color:#666;

    font-size:14px;
}

.info-value{

    margin-top:8px;

    font-size:28px;

    font-weight:bold;

    color:#0f766e;
}

/* 棋盤 */

.board{

    display:grid;

    justify-content:center;

    gap:8px;

    margin-bottom:20px;
}

/* 格子 */

.cell{

    width:58px;
    height:58px;

    border-radius:16px;

    display:flex;
    justify-content:center;
    align-items:center;

    cursor:pointer;

    user-select:none;

    font-size:24px;

    font-weight:bold;

    transition:0.15s;

    background:
    linear-gradient(
        145deg,
        #d1fae5,
        #99f6e4
    );

    box-shadow:
    0 5px 10px rgba(0,0,0,0.08),
    inset 0 2px 0 rgba(255,255,255,0.8);
}

.cell:hover{

    transform:
    scale(1.06)
    translateY(-2px);

    box-shadow:
    0 10px 16px rgba(0,0,0,0.12);
}

/* 已翻開 */

.revealed{

    background:
    linear-gradient(
        145deg,
        #ffffff,
        #f0fdfa
    );
}

/* 安全格 */

.safe{

    background:
    linear-gradient(
        145deg,
        #dcfce7,
        #bbf7d0
    );
}

/* 地雷 */

.mine{

    background:
    linear-gradient(
        145deg,
        #fb7185,
        #ef4444
    );

    color:white;

    animation:shake 0.2s;
}

@keyframes shake{

    0%{transform:translateX(0);}
    25%{transform:translateX(-4px);}
    50%{transform:translateX(4px);}
    75%{transform:translateX(-4px);}
    100%{transform:translateX(0);}
}

/* 旗子 */

.flag{

    background:
    linear-gradient(
        145deg,
        #fdba74,
        #fb923c
    );

    color:white;
}

/* 訊息 */

.message{

    min-height:60px;

    display:flex;
    align-items:center;
    justify-content:center;

    text-align:center;

    border-radius:18px;

    padding:15px;

    background:
    linear-gradient(
        135deg,
        #f0fdfa,
        #ecfeff
    );

    color:#0f766e;

    font-weight:bold;

    box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.8);
}

/* 按鈕 */

.restart{

    width:100%;

    margin-top:20px;

    border:none;

    padding:15px;

    border-radius:18px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    color:white;

    background:
    linear-gradient(
        135deg,
        #06b6d4,
        #14b8a6
    );

    transition:0.25s;
}

.restart:hover{

    transform:translateY(-2px);

    box-shadow:
    0 10px 18px rgba(6,182,212,0.3);
}

/* 底部 */

.footer{

    margin-top:18px;

    text-align:center;

    color:#666;

    font-size:14px;
}

</style>
</head>

<body>

<div class="bubble bubble1"></div>
<div class="bubble bubble2"></div>
<div class="bubble bubble3"></div>

<div class="game-container">

    <div class="title">

        <h1>🍔 熱量地雷</h1>

        <p>
            避開高熱量食物，打造健康生活
        </p>

    </div>

    <!-- 關卡 -->

    <div class="level-select">

        <button
            class="level-btn easy"
            onclick="setLevel(4,2)"
        >
            初級 4x4
        </button>

        <button
            class="level-btn medium"
            onclick="setLevel(6,6)"
        >
            中級 6x6
        </button>

        <button
            class="level-btn hard"
            onclick="setLevel(8,10)"
        >
            高級 8x8
        </button>

    </div>

    <!-- 資訊 -->

    <div class="top-bar">

        <div class="info-card">

            <div class="info-label">
                💣 飲食地雷
            </div>

            <div class="info-value" id="mineCount">
                0
            </div>

        </div>

        <div class="info-card">

            <div class="info-label">
                🚩 旗子
            </div>

            <div class="info-value" id="flagCount">
                0
            </div>

        </div>

        <div class="info-card">

            <div class="info-label">
                ❤️ 健康值
            </div>

            <div class="info-value" id="health">
                100
            </div>

        </div>

    </div>

    <!-- 棋盤 -->

    <div class="board" id="board"></div>

    <!-- 訊息 -->

    <div class="message" id="message">

        左鍵翻格子，右鍵插旗 🚩

    </div>

    <!-- 重開 -->

    <button class="restart" onclick="startGame()">

        🔄 重新開始

    </button>

    <div class="footer">

        少糖、少油、多運動 💪

    </div>

</div>

<script>

let size = 4;
let mineTotal = 2;

let board = [];

let gameOver = false;

let health = 100;

let flags = 0;

const foods = [
    "🍔",
    "🍟",
    "🧋",
    "🍩",
    "🍰",
    "🍗"
];

const tips = [

    "少喝含糖飲料更健康",

    "炸物脂肪含量偏高",

    "均衡飲食很重要",

    "多吃蔬果有助健康",

    "避免高熱量宵夜"
];

function setLevel(newSize,mines){

    size = newSize;

    mineTotal = mines;

    startGame();
}

function startGame(){

    board = [];

    gameOver = false;

    health = 100;

    flags = 0;

    document.getElementById("health").innerText =
        health;

    document.getElementById("flagCount").innerText =
        flags;

    document.getElementById("mineCount").innerText =
        mineTotal - flags;

    document.getElementById("message").innerText =
        "左鍵翻格子，右鍵插旗 🚩";

    const boardElement =
        document.getElementById("board");

    boardElement.innerHTML = "";

    boardElement.style.gridTemplateColumns =
        `repeat(${size},58px)`;

    // 建立棋盤

    for(let row=0; row<size; row++){

        board[row] = [];

        for(let col=0; col<size; col++){

            board[row][col] = {

                mine:false,

                revealed:false,

                flagged:false,

                count:0
            };
        }
    }

    // 放地雷

    let placed = 0;

    while(placed < mineTotal){

        let r = Math.floor(Math.random()*size);

        let c = Math.floor(Math.random()*size);

        if(!board[r][c].mine){

            board[r][c].mine = true;

            placed++;
        }
    }

    // 計算數字

    for(let row=0; row<size; row++){

        for(let col=0; col<size; col++){

            if(board[row][col].mine) continue;

            let count = 0;

            for(let dr=-1; dr<=1; dr++){

                for(let dc=-1; dc<=1; dc++){

                    let nr = row + dr;

                    let nc = col + dc;

                    if(
                        nr>=0 &&
                        nr<size &&
                        nc>=0 &&
                        nc<size &&
                        board[nr][nc].mine
                    ){
                        count++;
                    }
                }
            }

            board[row][col].count = count;
        }
    }

    // 建立格子

    for(let row=0; row<size; row++){

        for(let col=0; col<size; col++){

            const cell =
                document.createElement("div");

            cell.classList.add("cell");

            cell.dataset.row = row;

            cell.dataset.col = col;

            // 左鍵

            cell.addEventListener(
                "click",
                revealCell
            );

            // 右鍵

            cell.addEventListener(
                "contextmenu",
                toggleFlag
            );

            boardElement.appendChild(cell);
        }
    }
}

function revealCell(){

    if(gameOver) return;

    const row = this.dataset.row;

    const col = this.dataset.col;

    const data = board[row][col];

    if(data.revealed || data.flagged) return;

    data.revealed = true;

    this.classList.add("revealed");

    // 地雷

    if(data.mine){

        this.classList.add("mine");

        this.innerText =
            foods[
                Math.floor(Math.random()*foods.length)
            ];

        health -= 25;

        document.getElementById("health").innerText =
            health;

        document.getElementById("message").innerText =
            "⚠️ " +
            tips[
                Math.floor(Math.random()*tips.length)
            ];

        if(health <= 0){

            gameOver = true;

            document.getElementById("message").innerText =
                "💀 健康值歸零！";

            revealAllMines();
        }

        return;
    }

    // 安全格

    this.classList.add("safe");

    if(data.count > 0){

        this.innerText = data.count;

    }else{

        this.innerText = "🥗";

        revealNearby(row,col);
    }

    checkWin();
}

function toggleFlag(e){

    e.preventDefault();

    if(gameOver) return;

    const row = this.dataset.row;

    const col = this.dataset.col;

    const data = board[row][col];

    if(data.revealed) return;

    data.flagged = !data.flagged;

    if(data.flagged){

        this.innerText = "🚩";

        this.classList.add("flag");

        flags++;

    }else{

        this.innerText = "";

        this.classList.remove("flag");

        flags--;
    }

    document.getElementById("flagCount").innerText =
        flags;

    // 剩餘炸彈數

    document.getElementById("mineCount").innerText =
        mineTotal - flags;
}

function revealNearby(row,col){

    for(let dr=-1; dr<=1; dr++){

        for(let dc=-1; dc<=1; dc++){

            let nr = parseInt(row) + dr;

            let nc = parseInt(col) + dc;

            if(
                nr>=0 &&
                nr<size &&
                nc>=0 &&
                nc<size
            ){

                const index =
                    nr * size + nc;

                const cellElement =
                    document.getElementsByClassName("cell")[index];

                const data =
                    board[nr][nc];

                if(
                    !data.revealed &&
                    !data.mine
                ){

                    cellElement.click();
                }
            }
        }
    }
}

function revealAllMines(){

    const cells =
        document.getElementsByClassName("cell");

    for(let row=0; row<size; row++){

        for(let col=0; col<size; col++){

            if(board[row][col].mine){

                const index =
                    row * size + col;

                cells[index].classList.add("mine");

                cells[index].innerText =
                    foods[
                        Math.floor(Math.random()*foods.length)
                    ];
            }
        }
    }
}

function checkWin(){

    let safe = 0;

    for(let row=0; row<size; row++){

        for(let col=0; col<size; col++){

            if(
                !board[row][col].mine &&
                board[row][col].revealed
            ){
                safe++;
            }
        }
    }

    if(
        safe ===
        (size * size - mineTotal)
    ){

        gameOver = true;

        document.getElementById("message").innerText =
            "🎉 健康飲食成功！";
    }
}

startGame();

</script>

</body>
</html>
