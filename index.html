<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>熱量地雷 Calories Sweeper</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI","Microsoft JhengHei",sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    overflow-y:auto;
    overflow-x:hidden;

    padding:30px 0;

    background:
    linear-gradient(
        rgba(0,0,0,0.35),
        rgba(0,0,0,0.35)
    ),
    url("https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1600&auto=format&fit=crop");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* 夜市燈光 */

body::before{

    content:"";

    position:fixed;

    width:100%;
    height:100%;

    background:
    radial-gradient(
        circle at top,
        rgba(255,255,255,0.15),
        transparent 60%
    );

    pointer-events:none;
}

/* 主畫面 */

.game-container{

    width:90%;

    max-width:920px;

    background:rgba(255,255,255,0.92);

    backdrop-filter:blur(10px);

    border-radius:35px;

    padding:30px;

    box-shadow:
    0 25px 50px rgba(0,0,0,0.35);

    position:relative;
}

/* 標題 */

.title{

    text-align:center;

    margin-bottom:20px;
}

.title h1{

    font-size:42px;

    color:#b91c1c;

    text-shadow:
    0 4px 12px rgba(0,0,0,0.15);
}

.title p{

    margin-top:10px;

    color:#555;

    font-size:18px;
}

/* 關卡 */

.level-select{

    display:flex;

    justify-content:center;

    flex-wrap:wrap;

    gap:15px;

    margin-bottom:25px;
}

.level-btn{

    border:none;

    padding:14px 22px;

    border-radius:18px;

    color:white;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    transition:0.25s;
}

.level-btn:hover{

    transform:
    translateY(-3px)
    scale(1.04);
}

.easy{
    background:linear-gradient(135deg,#22c55e,#15803d);
}

.medium{
    background:linear-gradient(135deg,#f59e0b,#ea580c);
}

.hard{
    background:linear-gradient(135deg,#ef4444,#b91c1c);
}

.hell{
    background:linear-gradient(135deg,#7f1d1d,#000);
    box-shadow:0 0 20px rgba(255,0,0,0.4);
}

/* 資訊欄 */

.top-bar{

    display:flex;

    gap:15px;

    flex-wrap:wrap;

    margin-bottom:25px;
}

.info-card{

    flex:1;

    min-width:160px;

    padding:18px;

    border-radius:20px;

    text-align:center;

    background:
    linear-gradient(
        145deg,
        #ffffff,
        #ecfeff
    );

    box-shadow:
    0 8px 16px rgba(0,0,0,0.08);
}

.info-label{

    color:#666;

    font-size:14px;
}

.info-value{

    margin-top:8px;

    font-size:30px;

    font-weight:bold;

    color:#0f766e;
}

/* 棋盤 */

.board{

    display:grid;

    justify-content:center;

    gap:8px;

    margin-bottom:20px;
}

/* 格子 */

.cell{

    width:50px;
    height:50px;

    border-radius:15px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:22px;
    font-weight:bold;

    cursor:pointer;

    user-select:none;

    transition:0.15s;

    background:
    linear-gradient(
        145deg,
        #d1fae5,
        #99f6e4
    );

    box-shadow:
    0 5px 10px rgba(0,0,0,0.08),
    inset 0 2px 0 rgba(255,255,255,0.8);
}

.cell:hover{

    transform:
    scale(1.08)
    translateY(-2px);
}

.revealed{

    background:
    linear-gradient(
        145deg,
        #fff,
        #ecfeff
    );
}

.safe{

    background:
    linear-gradient(
        145deg,
        #dcfce7,
        #bbf7d0
    );
}

.flag{

    background:
    linear-gradient(
        145deg,
        #fdba74,
        #fb923c
    );

    color:white;
}

.mine{

    background:
    linear-gradient(
        145deg,
        #ef4444,
        #991b1b
    );

    color:white;

    animation:shake 0.2s;
}

@keyframes shake{

    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
    100%{transform:translateX(0);}
}

/* 訊息 */

.message{

    min-height:70px;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:22px;

    padding:18px;

    font-size:18px;

    font-weight:bold;

    color:#0f766e;

    background:
    linear-gradient(
        135deg,
        #f0fdfa,
        #ecfeff
    );

    box-shadow:
    inset 0 2px 0 rgba(255,255,255,0.8);
}

/* 重開 */

.restart{

    width:100%;

    margin-top:20px;

    border:none;

    padding:16px;

    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        #06b6d4,
        #14b8a6
    );

    color:white;

    font-size:20px;

    font-weight:bold;

    cursor:pointer;

    transition:0.25s;
}

.restart:hover{

    transform:translateY(-3px);

    box-shadow:
    0 10px 18px rgba(6,182,212,0.35);
}

/* 底部 */

.footer{

    margin-top:15px;

    text-align:center;

    color:#666;

    font-size:14px;
}

/* 手機版 */

@media(max-width:900px){

    .game-container{

        width:95%;

        padding:20px;
    }

    .title h1{

        font-size:34px;
    }

    .cell{

        width:42px;
        height:42px;

        font-size:18px;
    }

    .info-value{

        font-size:24px;
    }
}

</style>
</head>

<body>

<div class="game-container">

    <div class="title">

        <h1>🍔 熱量地雷</h1>

        <p>
            高熱量誘惑全面失控！
        </p>

    </div>

    <!-- 難度 -->

    <div class="level-select">

        <button
            class="level-btn easy"
            onclick="setLevel(4,5,60)"
        >
            初級 4x4
        </button>

        <button
            class="level-btn medium"
            onclick="setLevel(6,10,90)"
        >
            中級 6x6
        </button>

        <button
            class="level-btn hard"
            onclick="setLevel(8,30,120)"
        >
            高級 8x8
        </button>

        <button
            class="level-btn hell"
            onclick="setLevel(10,50,150)"
        >
            💀 地獄模式
        </button>

    </div>

    <!-- 資訊 -->

    <div class="top-bar">

        <div class="info-card">

            <div class="info-label">
                💣 剩餘地雷
            </div>

            <div class="info-value" id="mineCount">
                0
            </div>

        </div>

        <div class="info-card">

            <div class="info-label">
                🚩 旗子
            </div>

            <div class="info-value" id="flagCount">
                0
            </div>

        </div>

        <div class="info-card">

            <div class="info-label">
                ❤️ 健康值
            </div>

            <div class="info-value" id="health">
                100
            </div>

        </div>

        <div class="info-card">

            <div class="info-label">
                ⏱ 剩餘時間
            </div>

            <div class="info-value" id="timer">
                60
            </div>

        </div>

    </div>

    <!-- 棋盤 -->

    <div class="board" id="board"></div>

    <!-- 訊息 -->

    <div class="message" id="message">

        左鍵翻格子，右鍵插旗 🚩

    </div>

    <!-- 重開 -->

    <button class="restart" onclick="startGame()">

        🔄 重新開始

    </button>

    <div class="footer">

        珍奶、炸雞、甜點正在誘惑你 🍟🧋🍰

    </div>

</div>

<script>

let size = 4;
let mineTotal = 5;
let timeLimit = 60;

let timer;
let timeLeft;

let board = [];

let flags = 0;

let health = 100;

let gameOver = false;

const foods = [

    "🍔",
    "🍟",
    "🧋",
    "🍩",
    "🍰",
    "🍗",
    "🌭",
    "🍕"
];

const tips = [

    "少喝含糖飲料更健康",

    "炸物脂肪含量偏高",

    "均衡飲食很重要",

    "避免高熱量宵夜",

    "夜市美食別吃過量"
];

function setLevel(newSize,mines,time){

    size = newSize;

    mineTotal = mines;

    timeLimit = time;

    startGame();
}

function startGame(){

    clearInterval(timer);

    board = [];

    flags = 0;

    health = 100;

    gameOver = false;

    timeLeft = timeLimit;

    document.getElementById("health").innerText =
        health;

    document.getElementById("flagCount").innerText =
        flags;

    document.getElementById("mineCount").innerText =
        mineTotal - flags;

    document.getElementById("timer").innerText =
        timeLeft;

    document.getElementById("message").innerText =
        "左鍵翻格子，右鍵插旗 🚩";

    startTimer();

    const boardElement =
        document.getElementById("board");

    boardElement.innerHTML = "";

    boardElement.style.gridTemplateColumns =
        `repeat(${size},50px)`;

    // 建立棋盤

    for(let row=0; row<size; row++){

        board[row] = [];

        for(let col=0; col<size; col++){

            board[row][col] = {

                mine:false,
                revealed:false,
                flagged:false,
                count:0
            };
        }
    }

    // 放地雷

    let placed = 0;

    while(placed < mineTotal){

        let r = Math.floor(Math.random()*size);

        let c = Math.floor(Math.random()*size);

        if(!board[r][c].mine){

            board[r][c].mine = true;

            placed++;
        }
    }

    // 計算數字

    for(let row=0; row<size; row++){

        for(let col=0; col<size; col++){

            if(board[row][col].mine) continue;

            let count = 0;

            for(let dr=-1; dr<=1; dr++){

                for(let dc=-1; dc<=1; dc++){

                    let nr = row + dr;

                    let nc = col + dc;

                    if(
                        nr>=0 &&
                        nr<size &&
                        nc>=0 &&
                        nc<size &&
                        board[nr][nc].mine
                    ){
                        count++;
                    }
                }
            }

            board[row][col].count = count;
        }
    }

    // 建立格子

    for(let row=0; row<size; row++){

        for(let col=0; col<size; col++){

            const cell =
                document.createElement("div");

            cell.classList.add("cell");

            cell.dataset.row = row;

            cell.dataset.col = col;

            cell.addEventListener(
                "click",
                revealCell
            );

            cell.addEventListener(
                "contextmenu",
                toggleFlag
            );

            boardElement.appendChild(cell);
        }
    }
}

function startTimer(){

    timer = setInterval(()=>{

        if(gameOver) return;

        timeLeft--;

        document.getElementById("timer").innerText =
            timeLeft;

        if(timeLeft <= 0){

            gameOver = true;

            clearInterval(timer);

            revealAllMines();

            document.getElementById("message").innerText =
                "⏰ 時間到了！你被高熱量誘惑擊敗了！";
        }

    },1000);
}

function revealCell(){

    if(gameOver) return;

    const row = this.dataset.row;

    const col = this.dataset.col;

    const data = board[row][col];

    if(data.revealed || data.flagged) return;

    data.revealed = true;

    this.classList.add("revealed");

    // 地雷

    if(data.mine){

        this.classList.add("mine");

        this.innerText =
            foods[
                Math.floor(Math.random()*foods.length)
            ];

        health -= 20;

        document.getElementById("health").innerText =
            health;

        document.getElementById("message").innerText =
            "⚠️ " +
            tips[
                Math.floor(Math.random()*tips.length)
            ];

        if(health <= 0){

            gameOver = true;

            clearInterval(timer);

            revealAllMines();

            document.getElementById("message").innerText =
                "💀 健康值歸零！";
        }

        return;
    }

    // 安全格

    this.classList.add("safe");

    if(data.count > 0){

        this.innerText = data.count;

    }else{

        this.innerText = "🥗";

        revealNearby(row,col);
    }

    checkWin();
}

function toggleFlag(e){

    e.preventDefault();

    if(gameOver) return;

    const row = this.dataset.row;

    const col = this.dataset.col;

    const data = board[row][col];

    if(data.revealed) return;

    data.flagged = !data.flagged;

    if(data.flagged){

        this.innerText = "🚩";

        this.classList.add("flag");

        flags++;

    }else{

        this.innerText = "";

        this.classList.remove("flag");

        flags--;
    }

    document.getElementById("flagCount").innerText =
        flags;

    document.getElementById("mineCount").innerText =
        mineTotal - flags;
}

function revealNearby(row,col){

    for(let dr=-1; dr<=1; dr++){

        for(let dc=-1; dc<=1; dc++){

            let nr = parseInt(row) + dr;

            let nc = parseInt(col) + dc;

            if(
                nr>=0 &&
                nr<size &&
                nc>=0 &&
                nc<size
            ){

                const index =
                    nr * size + nc;

                const cellElement =
                    document.getElementsByClassName("cell")[index];

                const data =
                    board[nr][nc];

                if(
                    !data.revealed &&
                    !data.mine
                ){

                    cellElement.click();
                }
            }
        }
    }
}

function revealAllMines(){

    const cells =
        document.getElementsByClassName("cell");

    for(let row=0; row<size; row++){

        for(let col=0; col<size; col++){

            if(board[row][col].mine){

                const index =
                    row * size + col;

                cells[index].classList.add("mine");

                cells[index].innerText =
                    foods[
                        Math.floor(Math.random()*foods.length)
                    ];
            }
        }
    }
}

function checkWin(){

    let safe = 0;

    for(let row=0; row<size; row++){

        for(let col=0; col<size; col++){

            if(
                !board[row][col].mine &&
                board[row][col].revealed
            ){
                safe++;
            }
        }
    }

    if(
        safe ===
        (size * size - mineTotal)
    ){

        gameOver = true;

        clearInterval(timer);

        document.getElementById("message").innerText =
            "🎉 健康飲食成功！";
    }
}

startGame();

</script>

</body>
</html>
