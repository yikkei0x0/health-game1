<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>熱量地雷 Calories Sweeper</title>

<style>

*{
    box-sizing:border-box;
    font-family:"Microsoft JhengHei",sans-serif;
}

body{
    margin:0;
    background:#dff6f0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.game-container{
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    width:520px;
}

h1{
    text-align:center;
    color:#2c7a7b;
}

.level-select{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:15px;
}

.level-btn{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#4fd1c5;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.level-btn:hover{
    background:#38b2ac;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#f4f4f4;
    padding:12px;
    border-radius:12px;
    margin-bottom:15px;
    font-size:18px;
    font-weight:bold;
}

.board{
    display:grid;
    gap:5px;
    justify-content:center;
}

.cell{
    width:50px;
    height:50px;
    background:#b2f5ea;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    user-select:none;
    font-weight:bold;
    font-size:20px;
    transition:0.15s;
}

.cell:hover{
    transform:scale(1.05);
}

.revealed{
    background:#edf2f7;
}

.mine{
    background:#fc8181;
    color:white;
}

.safe{
    background:#c6f6d5;
}

.flag{
    background:#f6ad55;
}

.message{
    margin-top:15px;
    min-height:40px;
    text-align:center;
    font-size:16px;
    color:#444;
}

.restart{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#38b2ac;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.restart:hover{
    background:#319795;
}

.note{
    text-align:center;
    margin-top:10px;
    color:#666;
    font-size:14px;
}

</style>
</head>

<body>

<div class="game-container">

    <h1>🍔 熱量地雷</h1>

    <div class="level-select">

        <button class="level-btn" onclick="setLevel(4,2)">
            初級 4x4
        </button>

        <button class="level-btn" onclick="setLevel(6,6)">
            中級 6x6
        </button>

        <button class="level-btn" onclick="setLevel(8,10)">
            高級 8x8
        </button>

    </div>

    <div class="top-bar">

        <div>
            🚩 旗子：<span id="flagCount">0</span>
        </div>

        <div>
            ❤️ 健康值：<span id="health">100</span>
        </div>

    </div>

    <div class="board" id="board"></div>

    <div class="message" id="message">
        左鍵開格子，右鍵插旗 🚩
    </div>

    <button class="restart" onclick="startGame()">
        重新開始
    </button>

    <div class="note">
        避開高熱量食物，維持健康飲食！
    </div>

</div>

<script>

let size = 4;
let mineTotal = 2;

let board = [];
let gameOver = false;
let health = 100;
let flags = 0;

const foods = [
    "🍔",
    "🍟",
    "🧋",
    "🍩",
    "🍰",
    "🍗"
];

const tips = [
    "少喝含糖飲料更健康",
    "炸物脂肪含量偏高",
    "均衡飲食很重要",
    "多吃蔬果有助健康",
    "避免高熱量宵夜"
];

function setLevel(newSize, mines){

    size = newSize;
    mineTotal = mines;

    startGame();
}

function startGame(){

    board = [];
    gameOver = false;
    health = 100;
    flags = 0;

    document.getElementById("health").innerText = health;
    document.getElementById("flagCount").innerText = flags;
    document.getElementById("message").innerText =
        "左鍵開格子，右鍵插旗 🚩";

    const boardElement = document.getElementById("board");

    boardElement.innerHTML = "";

    boardElement.style.gridTemplateColumns =
        `repeat(${size}, 50px)`;

    // 建立棋盤
    for(let row=0; row<size; row++){

        board[row] = [];

        for(let col=0; col<size; col++){

            board[row][col] = {
                mine:false,
                revealed:false,
                flagged:false,
                count:0
            };
        }
    }

    // 放地雷
    let placed = 0;

    while(placed < mineTotal){

        let r = Math.floor(Math.random()*size);
        let c = Math.floor(Math.random()*size);

        if(!board[r][c].mine){

            board[r][c].mine = true;
            placed++;
        }
    }

    // 計算數字
    for(let row=0; row<size; row++){

        for(let col=0; col<size; col++){

            if(board[row][col].mine) continue;

            let count = 0;

            for(let dr=-1; dr<=1; dr++){

                for(let dc=-1; dc<=1; dc++){

                    let nr = row + dr;
                    let nc = col + dc;

                    if(
                        nr>=0 &&
                        nr<size &&
                        nc>=0 &&
                        nc<size &&
                        board[nr][nc].mine
                    ){
                        count++;
                    }
                }
            }

            board[row][col].count = count;
        }
    }

    // 建立畫面
    for(let row=0; row<size; row++){

        for(let col=0; col<size; col++){

            const cell = document.createElement("div");

            cell.classList.add("cell");

            cell.dataset.row = row;
            cell.dataset.col = col;

            // 左鍵
            cell.addEventListener("click", revealCell);

            // 右鍵插旗
            cell.addEventListener("contextmenu", toggleFlag);

            boardElement.appendChild(cell);
        }
    }
}

function revealCell(){

    if(gameOver) return;

    const row = this.dataset.row;
    const col = this.dataset.col;

    const data = board[row][col];

    if(data.revealed || data.flagged) return;

    data.revealed = true;

    this.classList.add("revealed");

    // 踩到地雷
    if(data.mine){

        this.classList.add("mine");

        this.innerText =
            foods[Math.floor(Math.random()*foods.length)];

        health -= 25;

        document.getElementById("health").innerText = health;

        document.getElementById("message").innerText =
            "⚠️ " +
            tips[Math.floor(Math.random()*tips.length)];

        if(health <= 0){

            gameOver = true;

            document.getElementById("message").innerText =
                "💀 健康值歸零！";

            revealAllMines();
        }

        return;
    }

    // 安全格
    this.classList.add("safe");

    if(data.count > 0){

        this.innerText = data.count;

    }else{

        this.innerText = "🥗";

        revealNearby(row, col);
    }

    checkWin();
}

function toggleFlag(e){

    e.preventDefault();

    if(gameOver) return;

    const row = this.dataset.row;
    const col = this.dataset.col;

    const data = board[row][col];

    if(data.revealed) return;

    data.flagged = !data.flagged;

    if(data.flagged){

        this.innerText = "🚩";
        this.classList.add("flag");
        flags++;

    }else{

        this.innerText = "";
        this.classList.remove("flag");
        flags--;
    }

    document.getElementById("flagCount").innerText = flags;
}

function revealNearby(row, col){

    for(let dr=-1; dr<=1; dr++){

        for(let dc=-1; dc<=1; dc++){

            let nr = parseInt(row) + dr;
            let nc = parseInt(col) + dc;

            if(
                nr>=0 &&
                nr<size &&
                nc>=0 &&
                nc<size
            ){

                const index = nr * size + nc;

                const cellElement =
                    document.getElementsByClassName("cell")[index];

                const data = board[nr][nc];

                if(!data.revealed && !data.mine){

                    cellElement.click();
                }
            }
        }
    }
}

function revealAllMines(){

    const cells = document.getElementsByClassName("cell");

    for(let row=0; row<size; row++){

        for(let col=0; col<size; col++){

            if(board[row][col].mine){

                const index = row * size + col;

                cells[index].classList.add("mine");

                cells[index].innerText =
                    foods[Math.floor(Math.random()*foods.length)];
            }
        }
    }
}

function checkWin(){

    let safe = 0;

    for(let row=0; row<size; row++){

        for(let col=0; col<size; col++){

            if(
                !board[row][col].mine &&
                board[row][col].revealed
            ){
                safe++;
            }
        }
    }

    if(safe === (size * size - mineTotal)){

        gameOver = true;

        document.getElementById("message").innerText =
            "🎉 健康飲食成功！";
    }
}

startGame();

</script>

</body>
</html>
